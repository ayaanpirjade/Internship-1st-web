<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form Example</title>
        <body>
            <h1>Employee Registration</h1>
            <form action="/submit" method="post">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email"  required><br><br>


                <label for="message">Qualification:</label><br>
                <textarea id="message" name="message" rows="4" cols="50" placeholder="Enter your qualification" required></textarea><br><br>

                <label for="gender">Gender:</label><br>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label><br><br>

                <label for="joining_date">Joining Date:</label><br>
                <input type="date" id="joining_date" name="joining_date" required><br><br>

                <label for="resume">Upload Resume:</label><br>
                <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required><br><br>
                <input type="reset" value="Reset">
                <input type="submit" value="Submit">
                <input type="button" value="Click Me" onclick="alert('Button Clicked!')">
                <input type="checkbox" id="subscribe" name="subscribe" value="yes">
                <label for="subscribe">Subscribe to newsletter</label><br><br>  
            </form>
    </head>
</html>
